<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Background Remover 🌀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }
        
        .upload-area:hover {
            background: #eef0ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #e0e4ff;
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
        }
        
        .upload-hint {
            color: #999;
            font-size: 13px;
            margin-top: 8px;
        }
        
        #fileInput {
            display: none;
        }
        
        .preview-container {
            margin-top: 30px;
            display: none;
        }
        
        .preview-container.show {
            display: block;
        }
        
        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .preview-box {
            border-radius: 10px;
            overflow: hidden;
            background: #f5f5f5;
        }
        
        .preview-box h3 {
            background: #667eea;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
        
        .preview-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: white;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.processing {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌀 Image Background Remover</h1>
        <p class="subtitle">AI-powered background removal in seconds</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📷</div>
            <div class="upload-text">Click or drag image here</div>
            <div class="upload-hint">Supports JPG, PNG, WebP</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="preview-container" id="previewContainer">
            <div class="preview-grid">
                <div class="preview-box">
                    <h3>Original</h3>
                    <img class="preview-image" id="originalImage" alt="Original">
                </div>
                <div class="preview-box">
                    <h3>Background Removed</h3>
                    <img class="preview-image" id="processedImage" alt="Processed">
                </div>
            </div>
            
            <button class="btn" id="downloadBtn">⬇️ Download Result</button>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="footer">
            Powered by Cloudflare Pages
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const originalImage = document.getElementById('originalImage');
        const processedImage = document.getElementById('processedImage');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');

        let originalFile = null;
        let processedBlob = null;

        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());

        // File selected
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showStatus('Please upload an image file', 'error');
                return;
            }

            originalFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImage.src = e.target.result;
                previewContainer.classList.add('show');
                processImage(file);
            };
            reader.readAsDataURL(file);
        }

        async function processImage(file) {
            showStatus('⏳ Processing image...', 'processing');
            
            // TODO: Replace with actual API endpoint
            // This is a placeholder - you'll need to connect to a backend service
            setTimeout(() => {
                // For demo purposes, show the same image
                processedImage.src = originalImage.src;
                processedBlob = null; // Will be set by actual API
                
                showStatus('✅ Background removed! (Demo mode - connect API for real processing)', 'success');
            }, 2000);
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status show ${type}`;
        }

        downloadBtn.addEventListener('click', () => {
            if (processedBlob) {
                const url = URL.createObjectURL(processedBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'background-removed.png';
                a.click();
                URL.revokeObjectURL(url);
            } else {
                showStatus('⚠️ No processed image available', 'error');
            }
        });
    </script>
</body>
</html>
