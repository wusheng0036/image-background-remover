<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片背景移除工具 🌀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }
        
        .upload-area:hover {
            background: #eef0ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #e0e4ff;
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 14px;
        }
        
        #fileInput {
            display: none;
        }
        
        .preview-container {
            margin-top: 30px;
            display: none;
        }
        
        .preview-container.show {
            display: block;
        }
        
        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        @media (max-width: 600px) {
            .preview-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .preview-box {
            border-radius: 10px;
            overflow: hidden;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
        }
        
        .preview-box h3 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
        }
        
        .preview-image {
            width: 100%;
            height: 250px;
            object-fit: contain;
            background: white;
            display: block;
        }
        
        .preview-box.processed .preview-image {
            background: 
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        @media (max-width: 600px) {
            .btn-group {
                grid-template-columns: 1fr;
            }
        }
        
        .status {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-weight: 500;
        }
        
        .status.show {
            display: block;
        }
        
        .status.processing {
            background: linear-gradient(135deg, #fff3cd 0%, #ffe8a1 100%);
            color: #856404;
            border: 1px solid #ffc107;
        }
        
        .status.success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 1px solid #28a745;
        }
        
        .status.error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border: 1px solid #dc3545;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 13px;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
        }
        
        @media (max-width: 600px) {
            .features {
                grid-template-columns: 1fr;
            }
        }
        
        .feature {
            text-align: center;
            padding: 10px;
        }
        
        .feature-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .feature-text {
            font-size: 13px;
            color: #666;
        }
        
        .api-key-input {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
            border: 2px solid #667eea;
        }
        
        .api-key-input h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .api-key-input input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .api-key-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .api-key-input p {
            font-size: 13px;
            color: #666;
            margin: 0;
        }
        
        .api-key-input a {
            color: #667eea;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌀 图片背景移除工具</h1>
        <p class="subtitle">使用 remove.bg API，高质量背景移除</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🚀</div>
                <div class="feature-text">5 秒处理</div>
            </div>
            <div class="feature">
                <div class="feature-icon">✨</div>
                <div class="feature-text">高质量</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🆓</div>
                <div class="feature-text">每月 50 张免费</div>
            </div>
        </div>
        
        <div class="api-key-input" id="apiKeyInput">
            <h4>🔑 需要 API Key</h4>
            <input type="text" id="apiKey" placeholder="输入你的 remove.bg API Key">
            <p>
                没有 API Key？<a href="https://www.remove.bg/api" target="_blank">免费获取</a>（每月 50 张免费）
            </p>
            <button class="btn" id="saveApiKeyBtn" style="margin-top: 10px;">
                💾 保存 API Key
            </button>
        </div>
        
        <div class="upload-area" id="uploadArea" style="display: none;">
            <div class="upload-icon">📷</div>
            <div class="upload-text">点击或拖拽图片到此处</div>
            <div class="upload-hint">支持 JPG、PNG 格式（最大 10MB）</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="preview-container" id="previewContainer">
            <div class="preview-grid">
                <div class="preview-box">
                    <h3>📷 原图</h3>
                    <img class="preview-image" id="originalImage" alt="原图">
                </div>
                <div class="preview-box processed">
                    <h3>✨ 处理后</h3>
                    <img class="preview-image" id="processedImage" alt="处理后">
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn" id="downloadBtn">
                    ⬇️ 下载结果
                </button>
                <button class="btn" id="newImageBtn" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                    🔄 处理新图片
                </button>
            </div>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="footer">
            Powered by Cloudflare Pages & remove.bg
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const originalImage = document.getElementById('originalImage');
        const processedImage = document.getElementById('processedImage');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');
        const newImageBtn = document.getElementById('newImageBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const apiKeyField = document.getElementById('apiKey');
        const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');

        let originalFile = null;
        let processedBlob = null;
        let processedUrl = null;
        let apiKey = localStorage.getItem('removebg_api_key') || '';

        // 检查是否已有 API Key
        if (apiKey) {
            apiKeyField.value = apiKey;
            apiKeyInput.style.display = 'none';
            uploadArea.style.display = 'block';
        }

        // 保存 API Key
        saveApiKeyBtn.addEventListener('click', () => {
            apiKey = apiKeyField.value.trim();
            if (!apiKey) {
                showStatus('❌ 请输入 API Key', 'error');
                return;
            }
            localStorage.setItem('removebg_api_key', apiKey);
            apiKeyInput.style.display = 'none';
            uploadArea.style.display = 'block';
            showStatus('✅ API Key 已保存', 'success');
        });

        // 点击上传
        uploadArea.addEventListener('click', () => fileInput.click());

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showStatus('❌ 请上传图片文件（JPG 或 PNG）', 'error');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                showStatus('❌ 图片大小不能超过 10MB', 'error');
                return;
            }

            originalFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImage.src = e.target.result;
                previewContainer.classList.add('show');
                uploadArea.style.display = 'none';
                processImage(file);
            };
            reader.readAsDataURL(file);
        }

        async function processImage(file) {
            showStatus('⏳ 正在移除背景，请稍候...', 'processing');

            try {
                const formData = new FormData();
                formData.append('image_file', file);
                formData.append('size', 'auto');

                const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: {
                        'X-Api-Key': apiKey
                    },
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.errors[0]?.title || '处理失败');
                }

                processedBlob = await response.blob();
                processedUrl = URL.createObjectURL(processedBlob);
                processedImage.src = processedUrl;

                showStatus('✅ 背景移除成功！', 'success');
                downloadBtn.disabled = false;
            } catch (error) {
                console.error('Background removal error:', error);
                
                if (error.message.includes('Authentication')) {
                    showStatus('❌ API Key 无效，请检查后重试', 'error');
                    localStorage.removeItem('removebg_api_key');
                    apiKeyInput.style.display = 'block';
                    uploadArea.style.display = 'none';
                } else if (error.message.includes('credits')) {
                    showStatus('❌ 免费额度已用完，请下月再来或充值', 'error');
                } else {
                    showStatus('❌ 处理失败：' + error.message, 'error');
                }
            }
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status show ${type}`;
        }

        // 下载结果
        downloadBtn.addEventListener('click', () => {
            if (processedBlob) {
                const url = URL.createObjectURL(processedBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'background-removed-' + Date.now() + '.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } else {
                showStatus('⚠️ 没有可下载的图片', 'error');
            }
        });

        // 处理新图片
        newImageBtn.addEventListener('click', () => {
            if (processedUrl) {
                URL.revokeObjectURL(processedUrl);
            }
            processedBlob = null;
            processedUrl = null;
            originalFile = null;
            
            previewContainer.classList.remove('show');
            uploadArea.style.display = 'block';
            fileInput.value = '';
            originalImage.src = '';
            processedImage.src = '';
            status.classList.remove('show');
            downloadBtn.disabled = false;
        });

        // 初始化
        downloadBtn.disabled = false;
    </script>
</body>
</html>
