<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片背景移除工具 🌀</title>
  
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; padding: 20px;
    }
    .container {
      max-width: 900px; margin: 0 auto; background: white;
      border-radius: 16px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
    
    /* 登录区域 */
    .login-section {
      background: #f8f9fa; border-radius: 12px; padding: 20px;
      margin-bottom: 25px; text-align: center;
    }
    .login-section h3 { color: #333; margin-bottom: 15px; font-size: 16px; }
    .user-info {
      display: none; background: #e8f5e9; border-radius: 12px;
      padding: 20px; margin-bottom: 25px; text-align: center;
    }
    .user-info.show { display: block; }
    .user-info p { margin: 5px 0; color: #2e7d32; }
    .user-info .email { font-size: 13px; color: #666; }
    .logout-btn {
      margin-top: 12px; padding: 8px 20px; background: #ff5252;
      color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    .logout-btn:hover { background: #ff1744; }
    
    /* 特性展示 */
    .features { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
    .feature {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; padding: 12px 20px; border-radius: 8px;
      font-size: 14px; display: flex; align-items: center; gap: 8px;
    }
    
    /* API Key 提示 */
    .api-key-notice {
      background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px;
      padding: 15px; margin-bottom: 25px; text-align: center;
    }
    .api-key-notice a { color: #0066cc; text-decoration: underline; }
    
    /* 图片处理区域 */
    .image-container {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;
    }
    @media (max-width: 768px) { .image-container { grid-template-columns: 1fr; } }
    .image-box {
      background: #f8f9fa; border-radius: 12px; padding: 20px;
      text-align: center; min-height: 300px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .image-box h3 { margin-bottom: 15px; color: #333; font-size: 16px; }
    .image-box img { max-width: 100%; max-height: 250px; border-radius: 8px; display: none; }
    .image-box img.show { display: block; }
    .upload-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; padding: 12px 30px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 16px; margin: 10px 5px;
    }
    .process-btn {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white; padding: 12px 30px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 16px; margin: 10px 5px;
    }
    .download-btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white; padding: 12px 30px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 16px; margin: 10px 5px; display: none;
    }
    .download-btn.show { display: inline-block; }
    .loading { display: none; color: #666; margin-top: 15px; }
    .loading.show { display: block; }
    .footer {
      text-align: center; color: #999; font-size: 12px;
      margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;
    }
    
    /* Google 登录按钮容器 */
    #g_id_onload_container {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌀 图片背景移除工具</h1>
    <p class="subtitle">使用 remove.bg API，高质量背景移除</p>
    
    <!-- 登录区域 -->
    <div id="login-section" class="login-section">
      <h3>🔐 登录以保存历史记录</h3>
      
      <!-- Google Identity Services 按钮 -->
      <div id="g_id_onload_container">
        <div id="g_id_onload"
             data-client_id="940353284015-3gfu2heql1mfr01lpau2kv54gepp5ad3.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-size="large"
             data-theme="outline"
             data-text="sign_in_with"
             data-shape="rectangular"
             data-logo_alignment="left">
        </div>
      </div>
    </div>
    
    <div id="user-section" class="user-info">
      <p>✅ 已登录：<strong id="user-name"></strong></p>
      <p class="email" id="user-email"></p>
      <button class="logout-btn" onclick="signOut()">退出登录</button>
    </div>
    
    <!-- 特性展示 -->
    <div class="features">
      <div class="feature">🚀 5 秒处理</div>
      <div class="feature">✨ 高质量</div>
      <div class="feature">🆓 每月 50 张免费</div>
    </div>
    
    <!-- API Key 提示 -->
    <div class="api-key-notice">
      <p>🔑 需要 API Key</p>
      <p style="font-size: 13px; margin-top: 8px;">
        没有 API Key？<a href="https://www.remove.bg/api" target="_blank">免费获取</a>（每月 50 张免费）
      </p>
    </div>
    
    <!-- 图片处理区域 -->
    <div class="image-container">
      <div class="image-box">
        <h3>📷 原图</h3>
        <img id="original-image" alt="原图">
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
        <button class="upload-btn" onclick="document.getElementById('file-input').click()">选择图片</button>
      </div>
      
      <div class="image-box">
        <h3>✨ 处理后</h3>
        <img id="processed-image" alt="处理后">
        <button class="process-btn" onclick="processImage()">移除背景</button>
        <a id="download-link" style="display: none;">
          <button class="download-btn" id="download-btn">下载图片</button>
        </a>
        <p class="loading" id="loading">处理中，请稍候...</p>
      </div>
    </div>
    
    <!-- 页脚 -->
    <div class="footer">
      Powered by Cloudflare Pages & remove.bg
    </div>
  </div>
  
  <script>
    // ============ Google 登录相关 ============
    
    // 处理 Google 登录响应
    function handleCredentialResponse(response) {
      console.log('收到 Google 登录响应:', response);
      
      // 解码 JWT token 获取用户信息
      const userInfo = JSON.parse(atob(response.credential.split('.')[1]));
      console.log('用户信息:', userInfo);
      
      // 显示用户信息
      document.getElementById('user-name').textContent = userInfo.name;
      document.getElementById('user-email').textContent = userInfo.email;
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('user-section').classList.add('show');
      
      // 存储 token 和用户信息
      localStorage.setItem('google_id_token', response.credential);
      localStorage.setItem('user_email', userInfo.email);
      localStorage.setItem('user_name', userInfo.name);
      localStorage.setItem('user_picture', userInfo.picture || '');
      localStorage.setItem('user_logged_in', 'true');
      
      console.log('用户登录成功:', userInfo.email);
    }
    
    // 退出登录
    function signOut() {
      // 清除本地存储
      localStorage.removeItem('google_id_token');
      localStorage.removeItem('user_email');
      localStorage.removeItem('user_name');
      localStorage.removeItem('user_picture');
      localStorage.removeItem('user_logged_in');
      
      // 显示登录区域
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('user-section').classList.remove('show');
      
      console.log('用户已退出');
    }
    
    // 页面加载时检查登录状态
    window.addEventListener('load', function() {
      if (localStorage.getItem('user_logged_in') === 'true') {
        const name = localStorage.getItem('user_name');
        const email = localStorage.getItem('user_email');
        if (name && email) {
          document.getElementById('user-name').textContent = name;
          document.getElementById('user-email').textContent = email;
          document.getElementById('login-section').style.display = 'none';
          document.getElementById('user-section').classList.add('show');
        }
      }
    });
    
    // ============ 图片处理相关 ============
    let selectedFile = null;
    
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file) {
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.getElementById('original-image');
          img.src = e.target.result;
          img.classList.add('show');
        };
        reader.readAsDataURL(file);
      }
    }
    
    async function processImage() {
      if (!selectedFile) { alert('请先选择一张图片！'); return; }
      
      const apiKey = prompt('请输入 remove.bg API Key：');
      if (!apiKey) { alert('需要 API Key 才能处理图片'); return; }
      
      const loading = document.getElementById('loading');
      const processedImg = document.getElementById('processed-image');
      const downloadBtn = document.getElementById('download-btn');
      const downloadLink = document.getElementById('download-link');
      
      loading.classList.add('show');
      processedImg.classList.remove('show');
      downloadBtn.classList.remove('show');
      
      const formData = new FormData();
      formData.append('image_file', selectedFile);
      formData.append('size', 'auto');
      
      try {
        const response = await fetch('https://api.remove.bg/v1.0/removebg', {
          method: 'POST',
          headers: { 'X-Api-Key': apiKey },
          body: formData
        });
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.errors[0].title || '处理失败');
        }
        
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        processedImg.src = url;
        processedImg.classList.add('show');
        
        downloadLink.href = url;
        downloadLink.download = 'background-removed.png';
        downloadBtn.classList.add('show');
        
      } catch (error) {
        alert('处理失败：' + error.message);
      } finally {
        loading.classList.remove('show');
      }
    }
  </script>
</body>
</html>
